events {}
http {
  include /etc/nginx/mime.types;

  server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    absolute_redirect off;

    location / {
      try_files $uri $uri/ $uri.html /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}
